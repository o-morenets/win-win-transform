name: winwin-travel

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: winwin
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5442:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d winwin"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-api:
    build:
      context: ./auth-api
      dockerfile: Dockerfile
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      DATA_API_URL: http://data-api:8081
    ports:
      - "8080:8080"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  data-api:
    build:
      context: ./data-api
      dockerfile: Dockerfile
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    ports:
      - "8081:8081"
    networks:
      - internal

networks:
  internal:

volumes:
  postgres-data: